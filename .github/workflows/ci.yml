name: CI / CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Run test suite ────────────────────────────────────────────────────
  test:
    name: Test (PHP 8.4)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: curl, mbstring, zip, gd, intl, pcntl, bcmath, opcache
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Configure Flux Pro Composer auth
        env:
          FLUX_USERNAME: ${{ secrets.FLUX_USERNAME }}
          FLUX_USER_NAME: ${{ secrets.FLUX_USER_NAME }}
          FLUX_LICENSE_KEY: ${{ secrets.FLUX_LICENSE_KEY }}
          FLUX_PASSWORD: ${{ secrets.FLUX_PASSWORD }}
        run: |
          FLUX_AUTH_USERNAME="${FLUX_USERNAME:-$FLUX_USER_NAME}"
          FLUX_AUTH_PASSWORD="${FLUX_LICENSE_KEY:-$FLUX_PASSWORD}"

          if [ -z "$FLUX_AUTH_USERNAME" ] || [ -z "$FLUX_AUTH_PASSWORD" ]; then
            echo "::error::Missing Flux credentials. Add FLUX_USERNAME plus FLUX_LICENSE_KEY, or FLUX_USER_NAME plus FLUX_PASSWORD, as repository secrets."
            exit 1
          fi

          composer config --global http-basic.composer.fluxui.dev "$FLUX_AUTH_USERNAME" "$FLUX_AUTH_PASSWORD"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test --compact

  # ── Job 2: CalVer tag + Docker build + deploy ─────────────────────────────
  release:
    name: Release & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write   # required to push CalVer git tags
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can read all tags

      # ── Calculate CalVer ────────────────────────────────────────────────────
      - name: Calculate CalVer tag
        id: calver
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)

          if [ "$MONTH" -le 6 ]; then
            HALF="H1"
          else
            HALF="H2"
          fi

          PREFIX="${YEAR}.${HALF}"

          git fetch --tags --quiet

          # Atomically claim the next unused build number.
          # Re-fetch tags before each attempt to detect concurrent runs.
          for ATTEMPT in 1 2 3 4 5; do
            git fetch --tags --quiet

            LATEST=$(git tag --list "${PREFIX}.*" \
              | awk -F. '{print $NF+0}' \
              | sort -n \
              | tail -1)

            BUILD=$((${LATEST:-0} + 1))
            VERSION="${PREFIX}.${BUILD}"

            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            # Push the tag immediately; fail fast if another run claimed it first.
            if git tag "$VERSION" && git push origin "$VERSION"; then
              echo "🏷️  CalVer: ${VERSION} (attempt ${ATTEMPT})"
              break
            fi

            echo "⚠️  Tag ${VERSION} already exists, retrying…"
            git tag -d "$VERSION" 2>/dev/null || true
            sleep $((ATTEMPT * 2))
          done

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ── Set up Docker Buildx ────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Log in to Docker Hub ────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build and push image ────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/omm-se:${{ steps.calver.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/omm-se:latest
          build-args: |
            FLUX_USERNAME=${{ secrets.FLUX_USERNAME }}
            FLUX_USER_NAME=${{ secrets.FLUX_USER_NAME }}
            FLUX_LICENSE_KEY=${{ secrets.FLUX_LICENSE_KEY }}
            FLUX_PASSWORD=${{ secrets.FLUX_PASSWORD }}

      # ── Deploy to production server via SSH ─────────────────────────────────
      - name: Deploy to production
        if: env.SSH_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DOCKERHUB_USERNAME,VERSION
          script: |
            set -e
            cd /opt/omm-se

            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export APP_VERSION="${{ steps.calver.outputs.version }}"

            # Pull the new image and restart the app container
            docker compose -f docker-compose.prod.yml pull app

            docker compose -f docker-compose.prod.yml up -d --remove-orphans app

            echo "✅ Deployed $APP_VERSION"
